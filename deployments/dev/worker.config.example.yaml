# SingerOS Development Configuration - Worker
# Copy this file to worker.config.yaml and update values

database:
  url: "postgres://singer_dev_user:singer_dev_password@singer-dev-postgresql:5432/singer_dev_db?sslmode=disable"
  debug: true

nats:
  url: "nats://singer-dev-nats:4222/"

redis:
  addr: "singer-dev-redis:6379"
  password: "redis_dev_password"

log:
  level: debug
  
github:
  app_id: 
  client_id: ""
  client_secret: ""
  private_key: |
    -----BEGIN RSA PRIVATE KEY-----
    # Your development private key here
    -----END RSA PRIVATE KEY-----
  webhook_secret: ""
  base_url: ""

# LLM configuration
llm:
  baseUrl: "https://api.yygu.cn/v3/llm.chat/"
  apiKey: "${LLM_API_KEY}"
  model: "qwen3.6-plus"
  temperature: 0.7
