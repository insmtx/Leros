# Leros Development Configuration - Worker

worker_id: 1
org_id: 1

database:
  url: "postgres://singer_dev_user:singer_dev_password@localhost:5432/singer_dev_db?sslmode=disable"
  debug: true

nats:
  url: "nats://localhost:4222/"

redis:
  addr: "localhost:6379"
  password: "redis_dev_password"

log:
  level: debug

llm:
  provider: "openai"
  api_key: "${LLM_API_KEY}"
  model: "qwen3.6-plus"
  base_url: "https://api.yygu.cn/v3/llm.chat/"

cli:
  default: "leros"
