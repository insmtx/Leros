syntax = "proto3";

package singeros.common;

option go_package = "github.com/insmtx/SingerOS/proto/common";

// 元数据信息
message Meta {
  // 请求ID
  string request_id = 1;
  // 链路追踪ID
  string trace_id = 2;
  // 时间戳
  int64 timestamp = 3;
}

// 分页信息
message Pagination {
  // 页码
  int32 page = 1;
  // 分页大小
  int32 size = 2;
}

// 错误信息
message Error {
  // 错误码
  int32 code = 1;
  // 错误消息
  string message = 2;
}