syntax = "proto3";

package singeros.interaction;

import "common/base.proto";

option go_package = "github.com/insmtx/SingerOS/proto/interaction";

// 渠道类型枚举
enum ChannelType {
  CHANNEL_UNKNOWN = 0;     // 未知渠道
  CHANNEL_WEB = 1;         // 网页渠道
  CHANNEL_SLACK = 2;       // Slack渠道
  CHANNEL_WECHAT = 3;      // 微信渠道
  CHANNEL_API = 4;         // API渠道
}

// 用户消息
message UserMessage {
  // 元数据
  singeros.common.Meta meta = 1;

  // 消息ID
  string message_id = 2;

  // 用户ID
  string user_id = 3;

  // 会话ID
  string session_id = 4;

  // 渠道类型
  ChannelType channel = 5;

  // 消息内容
  string content = 6;

  // 元数据
  map<string,string> metadata = 7;
}

// 助手消息
message AssistantMessage {
  // 元数据
  singeros.common.Meta meta = 1;

  // 消息ID
  string message_id = 2;

  // 会话ID
  string session_id = 3;

  // 消息内容
  string content = 4;

  // 工具调用列表
  repeated ToolCall tool_calls = 5;
}

// 工具调用
message ToolCall {
  // 工具名称
  string tool_name = 1;

  // 参数
  string arguments = 2;
}