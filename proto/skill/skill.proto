syntax = "proto3";

package singeros.skill;

option go_package = "github.com/insmtx/SingerOS/proto/skill";

// Skill请求
message SkillRequest {
  // 请求ID
  string request_id = 1;

  // Skill名称
  string skill_name = 2;

  // 会话ID
  string session_id = 3;

  // 输入内容
  string input = 4;

  // 参数
  map<string,string> parameters = 5;
}

// Skill响应
message SkillResponse {
  // 请求ID
  string request_id = 1;

  // 是否成功
  bool success = 2;

  // 输出内容
  string output = 3;

  // 错误信息
  string error = 4;
}