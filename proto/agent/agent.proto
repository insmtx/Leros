syntax = "proto3";

package singeros.agent;

import "common/base.proto";

option go_package = "github.com/insmtx/SingerOS/proto/agent";

// Agent状态枚举
enum AgentStatus {
  AGENT_IDLE = 0;        // 空闲
  AGENT_RUNNING = 1;     // 运行中
  AGENT_FAILED = 2;      // 失败
  AGENT_FINISHED = 3;    // 已完成
}

// Agent任务
message AgentTask {
  // 元数据
  singeros.common.Meta meta = 1;

  // 任务ID
  string task_id = 2;

  // Agent ID
  string agent_id = 3;

  // 会话ID
  string session_id = 4;

  // 输入内容
  string input = 5;

  // 上下文信息
  map<string,string> context = 6;
}

// Agent执行结果
message AgentResult {
  // 任务ID
  string task_id = 1;

  // 状态
  AgentStatus status = 2;

  // 输出内容
  string output = 3;

  // 错误信息
  string error = 4;
}

// Agent思维过程
message AgentThought {
  // 任务ID
  string task_id = 1;

  // 思维内容
  string content = 2;

  // 时间戳
  int64 timestamp = 3;
}
