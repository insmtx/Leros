syntax = "proto3";

package singeros.event;

option go_package = "github.com/insmtx/SingerOS/proto/event";

// 事件类型枚举
enum EventType {
  EVENT_UNKNOWN = 0;                // 未知事件
  EVENT_AGENT_TASK_CREATED = 1;     // Agent任务创建
  EVENT_AGENT_TASK_FINISHED = 2;    // Agent任务完成
  EVENT_TOOL_CALLED = 3;            // 工具被调用
  EVENT_WORKFLOW_STARTED = 4;       // 工作流开始
  EVENT_WORKFLOW_FINISHED = 5;      // 工作流完成
}

// 事件
message Event {
  // 事件类型
  EventType type = 1;

  // 事件ID
  string id = 2;

  // 时间戳
  int64 timestamp = 3;

  // 事件源
  string source = 4;

  // 事件负载
  bytes payload = 5;
}