    type: object
  github_com_insmtx_SingerOS_backend_types.ToolCallStatus:
    enum:
    - pending
    - running
    - success
    - error
    type: string
    x-enum-varnames:
    - ToolCallStatusPending
    - ToolCallStatusRunning
    - ToolCallStatusSuccess
    - ToolCallStatusError
